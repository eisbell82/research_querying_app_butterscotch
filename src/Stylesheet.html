<style>
:root{--ink:#0d0d1a;--ink2:#3d3d5c;--muted:#8888aa;--line:#e8e8f0;--bg:#f4f4fa;--w:#fff;--ac:#5b5bd6;--acl:#ededfc;--sh:0 2px 12px rgba(13,13,26,.08);--shl:0 8px 40px rgba(13,13,26,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

#app{display:block}
.hdr{background:var(--ink);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.03em}.logo span{color:#818cf8}
.cnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:#555577;background:rgba(255,255,255,.05);padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.08)}
.hdr-r{display:flex;align-items:center;gap:8px}
.btn-new{background:#818cf8;color:#fff;border:none;cursor:pointer;padding:9px 16px;border-radius:9px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;transition:background .15s,transform .1s}
.btn-new:hover{background:#6366f1;transform:translateY(-1px)}

.tb{background:var(--w);border-bottom:1px solid var(--line);padding:12px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:180px}
.sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.si{width:100%;padding:8px 12px 8px 35px;border-radius:8px;border:1.5px solid var(--line);background:var(--bg);font-family:'Sora',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
.si:focus{border-color:var(--ac);background:#fff}
.tabs{display:flex;gap:3px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:7px;border:1.5px solid transparent;background:transparent;cursor:pointer;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s}
.tab:hover{background:var(--bg);color:var(--ink2)}.tab.on{background:var(--acl);color:var(--ac);border-color:var(--ac)}

.main{padding:22px 24px;max-width:1200px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.card{background:var(--w);border-radius:12px;padding:18px;border:1.5px solid var(--line);cursor:pointer;transition:all .15s;box-shadow:var(--sh);animation:fu .25s ease both}
.card:hover{box-shadow:var(--shl);border-color:#d0d0e8;transform:translateY(-2px)}
.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.ctitle{font-size:14px;font-weight:700;color:var(--ink);line-height:1.4;flex:1}
.clead{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:7px}
.ccat{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:7px}
.chyp{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cf{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px}
.tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--ink2)}
.dr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.bd{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.b-Planning{background:#fef3c7;color:#d97706}.bd-Planning{background:#d97706}
.b-In-Progress{background:#dcfce7;color:#16a34a}.bd-In-Progress{background:#16a34a}
.b-On-Hold{background:#ede9fe;color:#7c3aed}.bd-On-Hold{background:#7c3aed}
.b-Completed{background:#f3f4f6;color:#4b5563}.bd-Completed{background:#4b5563}
.b-Archived{background:#fee2e2;color:#dc2626}.bd-Archived{background:#dc2626}

.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.ei{font-size:48px;margin-bottom:12px;opacity:.6}.et{font-size:17px;font-weight:700;color:var(--ink2);margin-bottom:5px}.es{font-size:13px;margin-bottom:18px}
.btn-ep{display:inline-flex;align-items:center;gap:6px;background:var(--ac);color:#fff;border:none;cursor:pointer;padding:11px 20px;border-radius:9px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;transition:background .15s}
.btn-ep:hover{background:#4f46e5}

.ov{display:none;position:fixed;inset:0;background:rgba(13,13,26,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{background:var(--w);border-radius:14px;width:100%;max-width:620px;max-height:92vh;overflow-y:auto;padding:28px;box-shadow:var(--shl);animation:su .2s ease}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt{font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.02em}
.bcl{background:var(--bg);border:none;cursor:pointer;width:30px;height:30px;border-radius:7px;font-size:17px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:background .15s}
.bcl:hover{background:var(--line);color:var(--ink)}
.fg{display:grid;gap:14px}.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fl label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;font-family:'JetBrains Mono',monospace}
.fl input,.fl select,.fl textarea{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--line);background:var(--bg);font-family:'Sora',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s,background .15s}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--ac);background:#fff}
.fl textarea{resize:vertical;min-height:72px;line-height:1.6}.fl select{cursor:pointer}
.hint{font-size:11px;color:var(--muted);margin-top:3px}

.mf{display:flex;justify-content:flex-end;align-items:center;margin-top:20px;padding-top:18px;border-top:1px solid var(--line)}
.ma{display:flex;gap:8px}
.btn-cn{background:var(--bg);color:var(--ink2);border:1.5px solid var(--line);padding:9px 14px;border-radius:8px;cursor:pointer;font-family:'Sora',sans-serif;font-size:13px;font-weight:600}
.btn-cn:hover{background:var(--line)}
.btn-sv{background:var(--ink);color:#fff;border:none;padding:9px 20px;border-radius:8px;cursor:pointer;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;transition:background .15s}
.btn-sv:hover{background:#1e1e3f}.btn-sv:disabled{background:var(--line);color:var(--muted);cursor:not-allowed}

.ml{text-align:center;padding:60px 20px;color:var(--muted)}
.mls{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}

.cov{display:none;position:fixed;inset:0;background:rgba(13,13,26,.6);z-index:300;align-items:center;justify-content:center;padding:20px}
.cov.open{display:flex}
.cb{background:#fff;border-radius:13px;padding:26px;max-width:360px;width:100%;box-shadow:var(--shl);text-align:center;animation:su .18s ease}
.ci{font-size:34px;margin-bottom:10px}.ctl{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:7px}
.ctxt{font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:18px}
.cbtns{display:flex;gap:9px;justify-content:center}
.btn-cc{padding:9px 18px;border-radius:8px;border:1.5px solid var(--line);background:var(--bg);color:var(--ink2);cursor:pointer;font-family:'Sora',sans-serif;font-size:13px;font-weight:600}
.btn-cd{padding:9px 18px;border-radius:8px;border:none;background:#dc2626;color:#fff;cursor:pointer;font-family:'Sora',sans-serif;font-size:13px;font-weight:700}

.toast{position:fixed;bottom:22px;right:22px;z-index:999;background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;box-shadow:var(--shl);display:none;animation:ti .25s ease}
.toast.show{display:block}.toast.error{background:#dc2626}.toast.success{background:#16a34a}

@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ti{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.hdr,.tb,.main{padding-left:14px;padding-right:14px}.modal{padding:20px}.fr{grid-template-columns:1fr}}

/* ── Email metadata ──────────────────────────────────────────── */
.meta-sec{margin-top:18px;padding:12px 14px;background:var(--bg);border-radius:9px;border:1.5px solid var(--line);display:flex;flex-direction:column;gap:6px}
.meta-row{display:flex;align-items:center;gap:10px}
.meta-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;flex-shrink:0;width:110px}
.meta-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink2);word-break:break-all}

/* ── Attachments ─────────────────────────────────────────────── */
.att-sec{margin-top:22px;padding-top:18px;border-top:1px solid var(--line)}
.att-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.att-hdr>span{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.att-btns{display:flex;gap:6px}
.btn-att{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:7px;border:1.5px solid var(--line);background:var(--bg);color:var(--ink2);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none}
.btn-att:hover{border-color:var(--ac);color:var(--ac);background:var(--acl)}
.att-link-form{display:flex;gap:7px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.att-link-form input{flex:1;min-width:140px;padding:8px 11px;border-radius:7px;border:1.5px solid var(--line);background:var(--bg);font-family:'Sora',sans-serif;font-size:12px;color:var(--ink);outline:none;transition:border-color .15s,background .15s}
.att-link-form input:focus{border-color:var(--ac);background:#fff}
.btn-link-add{padding:8px 14px;border-radius:7px;border:none;background:var(--ac);color:#fff;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-link-add:hover{background:#4f46e5}
.btn-link-cancel{padding:8px 12px;border-radius:7px;border:1.5px solid var(--line);background:var(--bg);color:var(--ink2);font-family:'Sora',sans-serif;font-size:12px;cursor:pointer}
.btn-link-cancel:hover{background:var(--line)}
.att-list{display:flex;flex-direction:column;gap:6px}
.att-row{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg);border-radius:8px;border:1.5px solid var(--line);animation:fu .2s ease both}
.att-icon{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.att-icon-csv{background:#dcfce7;color:#16a34a}
.att-icon-xls,.att-icon-xlsx{background:#d1fae5;color:#059669}
.att-icon-sheet{background:#dbeafe;color:#2563eb}
.att-icon-file{background:var(--line);color:var(--ink2)}
.att-name{flex:1;font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.att-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0}
.att-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.btn-att-open{font-family:'Sora',sans-serif;font-size:11px;font-weight:700;color:var(--ac);text-decoration:none;padding:4px 9px;border-radius:5px;background:var(--acl);transition:background .15s;white-space:nowrap}
.btn-att-open:hover{background:#ddddf8}
.btn-att-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:2px 6px;border-radius:5px;line-height:1;transition:all .15s}
.btn-att-del:hover{background:#fee2e2;color:#dc2626}
.att-empty{text-align:center;padding:18px;color:var(--muted);font-size:12px}
.att-loading{display:flex;align-items:center;gap:8px;padding:14px;color:var(--muted);font-size:12px}
.att-spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
</style>
