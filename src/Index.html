<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Database</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <?!= include('Stylesheet'); ?>
</head>
<body>

  <!-- ── TOP NAVIGATION ────────────────────────────────────── -->
  <nav class="navbar navbar-dark sticky-top">
    <div class="container-fluid px-4">
      <span class="navbar-brand d-flex align-items-center gap-2">
        <i class="bi bi-journal-medical fs-4"></i>
        <span class="fw-bold">Research Database</span>
      </span>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-success btn-sm fw-semibold px-3" onclick="openAddModal()">
          <i class="bi bi-plus-lg me-1"></i>Add Experiment
        </button>
      </div>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ──────────────────────────────────────── -->
  <div class="container-fluid px-4 py-4">

    <!-- Search & Filter Card -->
    <div class="card filter-card mb-4">
      <div class="card-body py-3">
        <div class="row g-2 align-items-end">

          <!-- Search -->
          <div class="col-12 col-lg-4">
            <label class="filter-label">Search</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0">
                <i class="bi bi-search text-muted"></i>
              </span>
              <input type="text" id="searchInput" class="form-control border-start-0 ps-0"
                     placeholder="Search title, description, tags, researcher…"
                     oninput="debounceSearch()">
              <button class="btn btn-outline-secondary border-start-0" id="clearSearchBtn"
                      onclick="clearSearch()" style="display:none" title="Clear search">
                <i class="bi bi-x-lg"></i>
              </button>
            </div>
          </div>

          <!-- Category -->
          <div class="col-6 col-sm-4 col-lg-2">
            <label class="filter-label">Category</label>
            <select id="filterCategory" class="form-select form-select-sm" onchange="applyFilters()">
              <option value="">All Categories</option>
            </select>
          </div>

          <!-- Status -->
          <div class="col-6 col-sm-4 col-lg-2">
            <label class="filter-label">Status</label>
            <select id="filterStatus" class="form-select form-select-sm" onchange="applyFilters()">
              <option value="">All Statuses</option>
              <option value="Planning">Planning</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
              <option value="On Hold">On Hold</option>
              <option value="Archived">Archived</option>
            </select>
          </div>

          <!-- Researcher -->
          <div class="col-6 col-sm-4 col-lg-2">
            <label class="filter-label">Researcher</label>
            <select id="filterResearcher" class="form-select form-select-sm" onchange="applyFilters()">
              <option value="">All Researchers</option>
            </select>
          </div>

          <!-- Actions -->
          <div class="col-6 col-sm-12 col-lg-2">
            <div class="d-flex gap-2">
              <button class="btn btn-outline-secondary btn-sm flex-fill" onclick="clearFilters()" title="Clear all filters">
                <i class="bi bi-x-circle me-1"></i>Clear
              </button>
              <button class="btn btn-outline-primary btn-sm flex-fill" onclick="exportCSV()" title="Export to CSV">
                <i class="bi bi-download me-1"></i>CSV
              </button>
            </div>
          </div>
        </div>

        <!-- Date Range Row -->
        <div class="row g-2 mt-1 align-items-end">
          <div class="col-auto">
            <label class="filter-label">Date From</label>
            <input type="date" id="filterDateFrom" class="form-control form-control-sm" onchange="applyFilters()">
          </div>
          <div class="col-auto">
            <label class="filter-label">Date To</label>
            <input type="date" id="filterDateTo" class="form-control form-control-sm" onchange="applyFilters()">
          </div>
          <div class="col-auto d-flex align-items-end">
            <div id="activeFiltersIndicator" class="text-primary small fw-semibold" style="display:none!important">
              <i class="bi bi-funnel-fill me-1"></i>Filters active
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Results Toolbar -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="d-flex align-items-center gap-2">
        <span id="resultsCount" class="fw-bold text-dark fs-5">—</span>
        <span class="text-muted">experiments found</span>
        <div id="loadingSpinner" class="spinner-border spinner-border-sm text-primary ms-2 d-none" role="status">
          <span class="visually-hidden">Loading…</span>
        </div>
      </div>
      <div class="btn-group btn-group-sm" role="group" aria-label="View toggle">
        <button type="button" id="btnTable" class="btn btn-outline-secondary active" onclick="setView('table')" title="Table view">
          <i class="bi bi-table me-1"></i>Table
        </button>
        <button type="button" id="btnCards" class="btn btn-outline-secondary" onclick="setView('cards')" title="Card view">
          <i class="bi bi-grid me-1"></i>Cards
        </button>
      </div>
    </div>

    <!-- ── TABLE VIEW ─────────────────────────────────────── -->
    <div id="tableView">
      <div class="table-responsive exp-table-wrapper">
        <table class="table table-hover align-middle exp-table mb-0">
          <thead>
            <tr>
              <th class="sortable" onclick="sortBy('ID')">
                ID <i class="bi bi-arrow-down-up sort-icon" id="sort-ID"></i>
              </th>
              <th class="sortable" onclick="sortBy('Timestamp')">
                Date <i class="bi bi-arrow-down-up sort-icon" id="sort-Timestamp"></i>
              </th>
              <th class="sortable" onclick="sortBy('Title')" style="min-width:200px">
                Title <i class="bi bi-arrow-down-up sort-icon" id="sort-Title"></i>
              </th>
              <th class="sortable" onclick="sortBy('Researcher')">
                Researcher <i class="bi bi-arrow-down-up sort-icon" id="sort-Researcher"></i>
              </th>
              <th class="sortable" onclick="sortBy('Category')">
                Category <i class="bi bi-arrow-down-up sort-icon" id="sort-Category"></i>
              </th>
              <th class="sortable" onclick="sortBy('Status')">
                Status <i class="bi bi-arrow-down-up sort-icon" id="sort-Status"></i>
              </th>
              <th>Tags</th>
              <th style="width:60px"></th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Populated by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── CARDS VIEW ─────────────────────────────────────── -->
    <div id="cardsView" class="d-none">
      <div id="cardsContainer" class="row g-3">
        <!-- Populated by JavaScript -->
      </div>
    </div>

    <!-- Pagination -->
    <div id="paginationContainer" class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">
      <span id="pageInfo" class="text-muted small"></span>
      <nav aria-label="Experiment pagination">
        <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
      </nav>
    </div>

  </div><!-- /container -->


  <!-- ── DETAIL MODAL ───────────────────────────────────────── -->
  <div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalLabel">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header border-bottom-0 pb-0">
          <div class="flex-grow-1 pe-3">
            <div class="d-flex align-items-center gap-2 mb-1">
              <code class="text-primary" id="detailId"></code>
              <span id="detailStatusBadge"></span>
            </div>
            <h5 class="modal-title fw-bold" id="detailTitle"></h5>
            <small class="text-muted" id="detailMeta"></small>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="detailBody">
          <!-- Populated by JavaScript -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-primary" onclick="openEditModal()">
            <i class="bi bi-pencil me-1"></i>Edit
          </button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── ADD / EDIT MODAL ───────────────────────────────────── -->
  <div class="modal fade" id="addModal" tabindex="-1" aria-labelledby="addModalLabel">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="addModalTitle">Add New Experiment</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">

          <!-- Form Tabs -->
          <ul class="nav nav-tabs form-tabs mb-4" id="formTabs" role="tablist">
            <li class="nav-item">
              <a class="nav-link active" data-tab="basic" onclick="switchTab('basic')" role="tab">
                <i class="bi bi-info-circle me-1"></i>Basic Info
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" data-tab="experiment" onclick="switchTab('experiment')" role="tab">
                <i class="bi bi-flask me-1"></i>Experiment
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" data-tab="results" onclick="switchTab('results')" role="tab">
                <i class="bi bi-graph-up me-1"></i>Results & Notes
              </a>
            </li>
          </ul>

          <form id="expForm" novalidate>
            <input type="hidden" id="editId">

            <!-- ── TAB: Basic Info ──────────────────────────── -->
            <div id="tab-basic">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label fw-semibold" for="fTitle">
                    Experiment Title <span class="text-danger">*</span>
                  </label>
                  <input type="text" id="fTitle" class="form-control"
                         placeholder="Brief, descriptive title of the experiment" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold" for="fResearcher">
                    Researcher <span class="text-danger">*</span>
                  </label>
                  <input type="text" id="fResearcher" class="form-control"
                         placeholder="Your name" list="researcherList" required>
                  <datalist id="researcherList"></datalist>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold" for="fStatus">Status</label>
                  <select id="fStatus" class="form-select">
                    <option value="Planning">Planning</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                    <option value="On Hold">On Hold</option>
                    <option value="Archived">Archived</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold" for="fCategory">Category</label>
                  <input type="text" id="fCategory" class="form-control"
                         placeholder="e.g. Cell Biology, Protein Expression…" list="categoryList">
                  <datalist id="categoryList"></datalist>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold" for="fTags">Tags</label>
                  <input type="text" id="fTags" class="form-control"
                         placeholder="Comma-separated: PCR, western blot, CRISPR…">
                  <div class="form-text">Separate multiple tags with commas.</div>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold" for="fDescription">
                    Description <span class="text-danger">*</span>
                  </label>
                  <textarea id="fDescription" class="form-control" rows="4" required
                            placeholder="Overview of the experiment's purpose, background, and design."></textarea>
                </div>
              </div>
            </div>

            <!-- ── TAB: Experiment ─────────────────────────── -->
            <div id="tab-experiment" class="d-none">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label fw-semibold" for="fHypothesis">Hypothesis</label>
                  <textarea id="fHypothesis" class="form-control" rows="3"
                            placeholder="What do you expect to find and why?"></textarea>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold" for="fMaterials">Materials / Reagents</label>
                  <textarea id="fMaterials" class="form-control" rows="5"
                            placeholder="List all materials, reagents, cell lines, antibodies, equipment…"></textarea>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold" for="fMethods">Methods / Protocol</label>
                  <textarea id="fMethods" class="form-control" rows="6"
                            placeholder="Step-by-step protocol, or reference to SOP/protocol document…"></textarea>
                </div>
              </div>
            </div>

            <!-- ── TAB: Results & Notes ────────────────────── -->
            <div id="tab-results" class="d-none">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label fw-semibold" for="fResults">Results</label>
                  <textarea id="fResults" class="form-control" rows="5"
                            placeholder="Quantitative and qualitative results. Reference figure/data file names if applicable."></textarea>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold" for="fObservations">Observations</label>
                  <textarea id="fObservations" class="form-control" rows="4"
                            placeholder="Notable observations, unexpected findings, deviations from protocol…"></textarea>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold" for="fNotes">Notes</label>
                  <textarea id="fNotes" class="form-control" rows="3"
                            placeholder="Additional notes, troubleshooting, follow-up experiments suggested…"></textarea>
                </div>
              </div>
            </div>
          </form>
        </div>

        <div class="modal-footer d-flex justify-content-between align-items-center">
          <span class="text-muted small"><span class="text-danger">*</span> Required fields</span>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary fw-semibold px-4" onclick="submitExperiment()" id="submitBtn">
              <span id="submitBtnText">Save Experiment</span>
              <span id="submitSpinner" class="spinner-border spinner-border-sm ms-1 d-none" role="status"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TOAST NOTIFICATIONS ───────────────────────────────── -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toastEl" class="toast align-items-center border-0" role="alert" aria-live="assertive">
      <div class="d-flex">
        <div class="toast-body d-flex align-items-center gap-2" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <?!= include('JavaScript'); ?>
</body>
</html>
