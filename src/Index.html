<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ResearchBase</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <?!= include('Stylesheet'); ?>
</head>
<body>

<div id="app">
  <header class="hdr">
    <div class="hdr-l">
      <div class="logo">Research<span>Base</span></div>
      <div class="cnt" id="cnt">…</div>
    </div>
    <div class="hdr-r">
      <button class="btn-new" id="btnNew" onclick="openModal()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Experiment
      </button>
    </div>
  </header>

  <div class="tb">
    <div class="sw">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="si" type="text" placeholder="Search experiments, hypotheses, tags…" oninput="render()" id="si"/>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="setF('All',this)">All</button>
      <button class="tab" onclick="setF('Planning',this)">Planning</button>
      <button class="tab" onclick="setF('In Progress',this)">In Progress</button>
      <button class="tab" onclick="setF('Completed',this)">Completed</button>
      <button class="tab" onclick="setF('On Hold',this)">On Hold</button>
      <button class="tab" onclick="setF('Archived',this)">Archived</button>
    </div>
  </div>

  <div class="main">
    <div class="ml" id="ml"><div class="mls"></div>Loading experiments…</div>
    <div id="grid" class="grid" style="display:none"></div>
    <div id="empty" class="empty" style="display:none">
      <div class="ei">🔬</div>
      <div class="et" id="et">No experiments yet</div>
      <div class="es" id="es">Add your first experiment to start tracking.</div>
      <button class="btn-ep" id="bep" onclick="openModal()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add First Experiment
      </button>
    </div>
  </div>
</div>

<!-- Experiment modal -->
<div class="ov" id="mov" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mh"><div class="mt" id="mt">New Experiment</div><button class="bcl" onclick="closeModal()">×</button></div>
    <div class="fg">
      <div class="fr">
        <div class="fl" style="grid-column:1/-1"><label>Experiment Title *</label><input type="text" id="fTitle" placeholder="Brief, descriptive title…"/></div>
        <div class="fl"><label>Researcher</label><input type="text" id="fResearcher" placeholder="Your name" list="researcherList"/><datalist id="researcherList"></datalist></div>
        <div class="fl"><label>Status</label>
          <select id="fStatus">
            <option>Planning</option>
            <option>In Progress</option>
            <option>Completed</option>
            <option>On Hold</option>
            <option>Archived</option>
          </select>
        </div>
      </div>
      <div class="fr">
        <div class="fl"><label>Category</label><input type="text" id="fCategory" placeholder="e.g. Cell Biology…" list="categoryList"/><datalist id="categoryList"></datalist></div>
        <div class="fl"><label>Tags</label><input type="text" id="fTags" placeholder="e.g. PCR, CRISPR, pilot"/><div class="hint">Separate with commas</div></div>
      </div>
      <div class="fl"><label>Description</label><textarea id="fDescription" rows="3" placeholder="Overview of the experiment's purpose, background, and design…"></textarea></div>
      <div class="fl"><label>Hypothesis</label><textarea id="fHypothesis" rows="2" placeholder="What do you expect to find and why?"></textarea></div>
      <div class="fl"><label>Materials / Reagents</label><textarea id="fMaterials" rows="3" placeholder="List all materials, reagents, equipment…"></textarea></div>
      <div class="fl"><label>Methods / Protocol</label><textarea id="fMethods" rows="3" placeholder="Step-by-step protocol or reference…"></textarea></div>
      <div class="fl"><label>Results</label><textarea id="fResults" rows="3" placeholder="Key findings, quantitative and qualitative results…"></textarea></div>
      <div class="fl"><label>Observations</label><textarea id="fObservations" rows="2" placeholder="Notable observations, unexpected findings…"></textarea></div>
      <div class="fl"><label>Notes</label><textarea id="fNotes" rows="2" placeholder="Additional notes, troubleshooting…"></textarea></div>
    </div>
    <div class="mf">
      <div class="ma">
        <button class="btn-cn" onclick="closeModal()">Cancel</button>
        <button class="btn-sv" id="bsv" onclick="saveExperiment()">Add Experiment</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="cov" id="cov">
  <div class="cb">
    <div class="ci">⚠️</div>
    <div class="ctl">Delete this experiment?</div>
    <div class="ctxt">This action cannot be undone.</div>
    <div class="cbtns">
      <button class="btn-cc" onclick="closeCon()">Keep it</button>
      <button class="btn-cd" onclick="doExportAndClose()">Yes, delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<?!= include('JavaScript'); ?>
</body>
</html>
