<script>
var experiments=[], editId=null, curF='All';

function g(id){return document.getElementById(id);}

window.onload=function(){
  google.script.run
    .withSuccessHandler(handleMetaLoaded)
    .withFailureHandler(function(){})
    .getAppMeta();
  loadExperiments();
};

function handleMetaLoaded(meta){
  if(!meta) return;
  populateDatalist('categoryList', meta.categories||[]);
  populateDatalist('researcherList', meta.researchers||[]);
}

function populateDatalist(id, items){
  var dl=g(id); if(!dl) return;
  dl.innerHTML=items.map(function(v){return'<option value="'+esc(v)+'"/>';}).join('');
}

function loadExperiments(){
  g('ml').style.display='block';
  g('grid').style.display='none';
  g('empty').style.display='none';
  google.script.run
    .withSuccessHandler(function(d){
      g('ml').style.display='none';
      experiments=Array.isArray(d)?d:[];
      render();
    })
    .withFailureHandler(function(e){
      g('ml').style.display='none';
      toast('Error loading experiments: '+e.message,'error');
    })
    .getExperiments({});
}

function render(){
  var q=g('si').value.toLowerCase();
  var f=experiments.filter(function(e){
    var matchStatus=(curF==='All'||e['Status']===curF);
    var matchSearch=!q||(e['Title']||'').toLowerCase().includes(q)||
      (e['Hypothesis']||'').toLowerCase().includes(q)||
      (e['Tags']||'').toLowerCase().includes(q)||
      (e['Researcher']||'').toLowerCase().includes(q)||
      (e['Description']||'').toLowerCase().includes(q)||
      (e['Category']||'').toLowerCase().includes(q);
    return matchStatus&&matchSearch;
  });
  g('cnt').textContent=f.length+' '+(f.length===1?'experiment':'experiments');
  if(!f.length){
    g('grid').style.display='none';
    g('empty').style.display='block';
    g('et').textContent=experiments.length?'No matching experiments':'No experiments yet';
    g('es').textContent=experiments.length?'Try adjusting your search or filter.':'Add your first experiment to start tracking.';
    g('bep').style.display=experiments.length?'none':'inline-flex';
    return;
  }
  g('grid').style.display='grid';
  g('empty').style.display='none';
  g('grid').innerHTML=f.map(function(e){
    var st=e['Status']||'Planning';
    var sk=st.replace(/\s+/g,'-');
    var tags=(e['Tags']||'').split(',').map(function(t){return t.trim();}).filter(Boolean);
    var excerpt=e['Description']||e['Hypothesis']||'';
    return '<div class="card" onclick=\'openEdit('+JSON.stringify(e).replace(/'/g,"&#39;")+')\'>'+
      '<div class="ct">'+
      '<div class="ctitle">'+esc(e['Title']||'Untitled')+'</div>'+
      '<div class="bdg b-'+sk+'"><div class="bd bd-'+sk+'"></div>'+esc(st)+'</div>'+
      '</div>'+
      (e['Researcher']?'<div class="clead">\uD83D\uDC64 '+esc(e['Researcher'])+'</div>':'')+
      (e['Category']?'<div class="ccat">\uD83C\uDFF7 '+esc(e['Category'])+'</div>':'')+
      (excerpt?'<div class="chyp">'+esc(excerpt)+'</div>':'')+
      '<div class="cf">'+
      '<div class="tags">'+tags.slice(0,4).map(function(t){return'<span class="tag">#'+esc(t)+'</span>';}).join('')+'</div>'+
      (e['Timestamp']?'<div class="dr">'+formatDate(e['Timestamp'])+'</div>':'')+
      '</div>'+
      '</div>';
  }).join('');
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(str){
  if(!str) return '';
  var d=new Date(str);
  if(isNaN(d.getTime())) return str;
  return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
}

function setF(s,b){
  curF=s;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  b.classList.add('on');
  render();
}

function openModal(){
  editId=null;
  g('mt').textContent='New Experiment';
  g('bsv').textContent='Add Experiment';
  clearForm();
  g('attSec').style.display='none';
  g('mov').classList.add('open');
  setTimeout(function(){g('fTitle').focus();},50);
}

function openEdit(e){
  editId=e['ID'];
  g('mt').textContent='Edit Experiment';
  g('bsv').textContent='Save Changes';
  g('fTitle').value=e['Title']||'';
  g('fResearcher').value=e['Researcher']||'';
  g('fStatus').value=e['Status']||'Planning';
  g('fCategory').value=e['Category']||'';
  g('fTags').value=e['Tags']||'';
  g('fDescription').value=e['Description']||'';
  g('fHypothesis').value=e['Hypothesis']||'';
  g('fMaterials').value=e['Materials']||'';
  g('fMethods').value=e['Methods']||'';
  g('fResults').value=e['Results']||'';
  g('fObservations').value=e['Observations']||'';
  g('fNotes').value=e['Notes']||'';
  g('attSec').style.display='block';
  g('attLinkForm').style.display='none';
  linkFormOpen=false;
  loadAttachments(e['ID']);
  g('mov').classList.add('open');
}

function closeModal(){
  g('mov').classList.remove('open');
  editId=null;
  linkFormOpen=false;
  g('attLinkForm').style.display='none';
}

function clearForm(){
  ['fTitle','fResearcher','fCategory','fTags','fDescription','fHypothesis',
   'fMaterials','fMethods','fResults','fObservations','fNotes'].forEach(function(id){g(id).value='';});
  g('fStatus').value='Planning';
}

function saveExperiment(){
  var title=g('fTitle').value.trim();
  if(!title){g('fTitle').focus();toast('Please enter a title.','error');return;}
  var btn=g('bsv');
  btn.disabled=true;
  var lbl=editId?'Save Changes':'Add Experiment';
  btn.textContent='Saving\u2026';
  var data={
    Title:title,
    Researcher:g('fResearcher').value.trim(),
    Status:g('fStatus').value,
    Category:g('fCategory').value.trim(),
    Tags:g('fTags').value.trim(),
    Description:g('fDescription').value.trim(),
    Hypothesis:g('fHypothesis').value.trim(),
    Materials:g('fMaterials').value.trim(),
    Methods:g('fMethods').value.trim(),
    Results:g('fResults').value.trim(),
    Observations:g('fObservations').value.trim(),
    Notes:g('fNotes').value.trim()
  };
  var done=function(r){
    btn.disabled=false;btn.textContent=lbl;
    if(r&&r.error){toast(r.error,'error');return;}
    if(r&&!r.success&&!r.error){toast('Something went wrong.','error');return;}
    toast(editId?'Experiment updated \u2713':'Experiment added \u2713','success');
    closeModal();
    google.script.run.withSuccessHandler(handleMetaLoaded).withFailureHandler(function(){}).getAppMeta();
    loadExperiments();
  };
  var fail=function(e){btn.disabled=false;btn.textContent=lbl;toast(e.message,'error');};
  if(editId){
    google.script.run.withSuccessHandler(done).withFailureHandler(fail).updateExperiment(editId,data);
  } else {
    google.script.run.withSuccessHandler(done).withFailureHandler(fail).addExperiment(data);
  }
}

function closeCon(){g('cov').classList.remove('open');}
function doExportAndClose(){closeCon();}

var tt;
function toast(msg,type){
  var t=g('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(tt);
  tt=setTimeout(function(){t.classList.remove('show');},3200);
}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeModal();closeCon();}
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&g('mov').classList.contains('open'))saveExperiment();
});

// ── Attachments ──────────────────────────────────────────────────

var linkFormOpen=false;

function loadAttachments(experimentId){
  g('attList').innerHTML='<div class="att-loading"><div class="att-spin"></div>Loading…</div>';
  google.script.run
    .withSuccessHandler(renderAttachments)
    .withFailureHandler(function(){
      g('attList').innerHTML='<div class="att-empty">Could not load attachments.</div>';
    })
    .getAttachments(experimentId);
}

function renderAttachments(attachments){
  if(!attachments||attachments.error){
    g('attList').innerHTML='<div class="att-empty">Could not load attachments.</div>';
    return;
  }
  if(!attachments.length){
    g('attList').innerHTML='<div class="att-empty">No attachments yet — upload a CSV/Excel file or link a Google Sheet.</div>';
    return;
  }
  g('attList').innerHTML=attachments.map(function(a){
    var ext=getFileExt(a.MimeType,a.FileName);
    var dateStr=a.UploadedDate?formatDate(a.UploadedDate):'';
    var typeLabel=a.Type==='link'?'Linked':'Uploaded';
    return '<div class="att-row">'+
      '<span class="att-icon att-icon-'+ext.toLowerCase()+'">'+ext+'</span>'+
      '<span class="att-name" title="'+esc(a.FileName)+'">'+esc(a.FileName)+'</span>'+
      (dateStr?'<span class="att-date" title="'+typeLabel+'">'+dateStr+'</span>':'')+
      '<div class="att-actions">'+
      '<a class="btn-att-open" href="'+esc(a.ViewLink)+'" target="_blank">Open</a>'+
      '<button class="btn-att-del" onclick="deleteAttachmentUI(\''+esc(a.AttachmentID)+'\')" title="Remove">×</button>'+
      '</div>'+
      '</div>';
  }).join('');
}

function getFileExt(mimeType,filename){
  if(mimeType==='application/vnd.google-apps.spreadsheet') return 'SHEET';
  var fname=(filename||'').toLowerCase();
  if(fname.endsWith('.csv')||mimeType==='text/csv') return 'CSV';
  if(fname.endsWith('.xlsx')||mimeType==='application/vnd.openxmlformats-officedocument.spreadsheetml.sheet') return 'XLSX';
  if(fname.endsWith('.xls')||mimeType==='application/vnd.ms-excel') return 'XLS';
  var dot=fname.lastIndexOf('.');
  var ext=dot>=0?fname.slice(dot+1).toUpperCase():'';
  return ext||'FILE';
}

function handleFileUpload(input){
  var file=input.files[0];
  if(!file) return;
  if(file.size>10*1024*1024){
    toast('File too large. Maximum size is 10 MB.','error');
    input.value='';
    return;
  }
  var btn=g('btnUpload');
  btn.style.opacity='0.5';
  btn.style.pointerEvents='none';
  var reader=new FileReader();
  reader.onload=function(ev){
    var base64=ev.target.result.split(',')[1];
    google.script.run
      .withSuccessHandler(function(r){
        btn.style.opacity='';
        btn.style.pointerEvents='';
        input.value='';
        if(r&&r.error){toast(r.error,'error');return;}
        toast('File attached \u2713','success');
        loadAttachments(editId);
      })
      .withFailureHandler(function(e){
        btn.style.opacity='';
        btn.style.pointerEvents='';
        input.value='';
        toast(e.message,'error');
      })
      .uploadAttachment(editId,file.name,file.type||'application/octet-stream',base64);
  };
  reader.readAsDataURL(file);
}

function toggleLinkForm(){
  linkFormOpen=!linkFormOpen;
  g('attLinkForm').style.display=linkFormOpen?'flex':'none';
  if(linkFormOpen) setTimeout(function(){g('attUrl').focus();},50);
}

function submitLink(){
  var url=g('attUrl').value.trim();
  var name=g('attName').value.trim();
  if(!url){toast('Please enter a Google Sheets URL.','error');return;}
  google.script.run
    .withSuccessHandler(function(r){
      if(r&&r.error){toast(r.error,'error');return;}
      toast('Sheet linked \u2713','success');
      g('attUrl').value='';
      g('attName').value='';
      toggleLinkForm();
      loadAttachments(editId);
    })
    .withFailureHandler(function(e){toast(e.message,'error');})
    .linkGoogleSheet(editId,url,name);
}

function deleteAttachmentUI(attachmentId){
  if(!confirm('Remove this attachment?')) return;
  google.script.run
    .withSuccessHandler(function(r){
      if(r&&r.error){toast(r.error,'error');return;}
      toast('Attachment removed','success');
      loadAttachments(editId);
    })
    .withFailureHandler(function(e){toast(e.message,'error');})
    .deleteAttachment(attachmentId);
}
</script>
